name: Skeptic Gate (Reusable)

# Reusable version of the Skeptic / Green Gate workflow.
# Single source of truth — callers in any repo replace their full copy with:
#
#   jobs:
#     skeptic_gate:
#       uses: jleechanorg/agent-orchestrator/.github/workflows/skeptic-gate-reusable.yml@main
#       with:
#         runner_labels: ${{ vars.SELF_HOSTED_RUNNER_LABELS || '["self-hosted","claude"]' }}
#       secrets: inherit
#
# context note: when called via workflow_call, github.repository / github.repository_owner
# resolve to the CALLING repo, so all gh api calls target the caller's repo automatically.
# concurrency is controlled by the caller's workflow level, not here.

on:
  workflow_call:
    inputs:
      pr_number:
        description: "PR number (for workflow_dispatch passthrough)"
        type: string
        required: false
        default: ""
      head_sha:
        description: "PR head commit SHA (for workflow_dispatch passthrough)"
        type: string
        required: false
        default: ""
      runner_labels:
        description: "JSON array of runner labels, e.g. '[\"self-hosted\",\"claude\"]'"
        type: string
        required: false
        default: '["ubuntu-latest"]'
      job_timeout_minutes:
        description: "Job-level timeout in minutes (must exceed poll step timeout)"
        type: number
        required: false
        default: 60
      poll_timeout_minutes:
        description: "Poll step timeout in minutes"
        type: number
        required: false
        default: 50

jobs:
  skeptic_gate:
    name: Skeptic Gate
    runs-on: ${{ fromJson(inputs.runner_labels) }}
    timeout-minutes: ${{ inputs.job_timeout_minutes }}
    permissions:
      pull-requests: write
      issues: write
      contents: read
      statuses: read
      checks: read
    outputs:
      trigger_updated: ${{ steps.post_trigger.outputs.trigger_updated }}
      trigger_sha: ${{ steps.post_trigger.outputs.trigger_sha }}
      eligible: ${{ steps.check_6green.outputs.eligible }}
      head_sha: ${{ steps.check_6green.outputs.head_sha }}
    steps:
      # ----------------------------------------------------------------
      # Guard: resolve PR number. Skip (not fail) when no PR context is
      # available — this happens when the workflow is called without
      # inputs (e.g. via workflow_run trigger or a misconfigured caller).
      # Exiting 0 (skip) avoids false failures on non-PR events while still
      # allowing the workflow to run for real PRs via workflow_dispatch.
      # ----------------------------------------------------------------
      - name: Resolve PR number and head SHA
        id: resolve_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WR_PR_NUM: ${{ inputs.pr_number || github.event.inputs.pr_number || '' }}
          WR_HEAD_SHA: ${{ inputs.head_sha || github.event.inputs.head_sha || '' }}
          # github.event.pull_request is only populated for pull_request events
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          WR_PR_NUM="$WR_PR_NUM"
          WR_HEAD_SHA="$WR_HEAD_SHA"

          # Only try github.event.pull_request when this is actually a pull_request event.
          # For workflow_call, workflow_run, schedule, etc. — github.event.pull_request is null
          # and accessing it causes an empty-string expansion, not an error.
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            if [ -z "$WR_PR_NUM" ]; then
              WR_PR_NUM="${{ github.event.pull_request.number }}"
            fi
            if [ -z "$WR_HEAD_SHA" ]; then
              WR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            fi
          fi

          if [ -z "$WR_PR_NUM" ]; then
            echo "SKIP: No PR number available (event=$GITHUB_EVENT_NAME, inputs.pr_number=${{ inputs.pr_number }}, inputs.head_sha=${{ inputs.head_sha }})"
            echo "pr_resolved=false" >> "$GITHUB_OUTPUT"
            echo "pr_num=" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
          else
            echo "PR_NUM=$WR_PR_NUM"
            echo "HEAD_SHA=${WR_HEAD_SHA:-<fetched from API>}"
            echo "pr_resolved=true" >> "$GITHUB_OUTPUT"
            echo "pr_num=$WR_PR_NUM" >> "$GITHUB_OUTPUT"
            echo "head_sha=${WR_HEAD_SHA:-}" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------------------------------
      # Pre-check: 6-green eligibility (gates 1-5).
      # Exits fast for non-eligible PRs — avoids expensive CLI setup.
      # ----------------------------------------------------------------
      - name: Check 6-green eligibility (gates 1-5)
        id: check_6green
        if: steps.resolve_pr.outputs.pr_resolved == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.resolve_pr.outputs.pr_num }}
        run: |
          PR_NUM=$PR_NUM
          ELIGIBLE=true

          # Resolve HEAD_SHA from API if not provided via inputs
          HEAD_SHA=""
          if [ -n "${{ steps.resolve_pr.outputs.head_sha }}" ]; then
            HEAD_SHA="${{ steps.resolve_pr.outputs.head_sha }}"
            echo "Using provided HEAD_SHA: ${HEAD_SHA:0:12}"
          else
            echo "Fetching HEAD SHA from API..."
            HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.head.sha' 2>/dev/null || echo "")
          fi

          # Gate 1: CI green — only "success" passes
          if [ -z "$HEAD_SHA" ]; then
            echo "ERROR: could not fetch PR head SHA" >&2
            ELIGIBLE=false
          else
            CI_STATUS=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/status \
              --jq '.state' 2>/dev/null || echo "error")
            if [ "$CI_STATUS" != "success" ]; then
              echo "GATE-1 FAIL: CI=$CI_STATUS"
              ELIGIBLE=false
            else
              echo "GATE-1 PASS: CI=success"
            fi
            echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          fi

          # Gate 2: No merge conflicts
          PR_META=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" \
            --jq '{mergeable: .mergeable, merged: .merged}' 2>/dev/null)
          MERGEABLE=$(echo "$PR_META" | jq -r '.mergeable // "unknown"')
          if [ "$MERGEABLE" != "true" ]; then
            echo "GATE-2 FAIL: mergeable=$MERGEABLE"
            ELIGIBLE=false
          else
            echo "GATE-2 PASS: no conflicts"
          fi

          # Gate 3: CR APPROVED — prefer formal review; fall back to status+comment.
          set +e -o pipefail
          LATEST_CR_PIPELINE=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM"/reviews \
            --paginate 2>/dev/null \
            | jq -rs 'add | [.[] | select((.user.login == "coderabbitai[bot]" or .user.login == "coderabbitai") and .state != "COMMENTED")] | sort_by(.submitted_at) | last | .state // "none"' 2>&1)
          LATEST_CR_EXIT=$?
          set -e +o pipefail
          if [ $LATEST_CR_EXIT -ne 0 ]; then
            echo "GATE-3 ERROR: CR review lookup failed (jq exit=$LATEST_CR_EXIT)"
            ELIGIBLE=false
          else
            LATEST_CR="${LATEST_CR_PIPELINE%$'\n'}"
            if [ "$LATEST_CR" = "APPROVED" ]; then
              echo "GATE-3 PASS: CR=APPROVED"
            elif [ "$LATEST_CR" != "none" ]; then
              echo "GATE-3 FAIL: CR=$LATEST_CR"
              ELIGIBLE=false
            else
              # Fallback: status + [approve] comment both required
              HEAD_COMMITTED_AT=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA" \
                --jq '.commit.committer.date // ""' 2>/dev/null || echo "")
              CR_STATUS=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/status \
                --jq '.statuses | map(select(.context == "CodeRabbit")) | sort_by(.updated_at) | last | .state // "none"' \
                2>/dev/null || echo "none")
              CR_APPROVE_COMMENT="none"
              if [ -n "$HEAD_COMMITTED_AT" ]; then
                set +e -o pipefail
                CR_APPROVE_PIPELINE=$(gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
                  --paginate 2>/dev/null \
                  | jq -rs --arg since "$HEAD_COMMITTED_AT" 'add | [.[] | select((.user.login == "coderabbitai[bot]" or .user.login == "coderabbitai") and .created_at >= $since and (.body | test("(?m)^\\s*\\[approve\\]\\s*$"; "i")))] | sort_by(.created_at) | last | if . then "APPROVED" else "none" end' 2>&1)
                CR_APPROVE_EXIT=$?
                set -e +o pipefail
                if [ "$CR_APPROVE_EXIT" -eq 0 ]; then
                  CR_APPROVE_COMMENT="${CR_APPROVE_PIPELINE%$'\n'}"
                else
                  echo "GATE-3 ERROR: CR approve comment lookup failed (exit=$CR_APPROVE_EXIT)"
                  CR_APPROVE_COMMENT="none"
                fi
              fi
              if [ "$CR_STATUS" = "success" ] && [ "$CR_APPROVE_COMMENT" = "APPROVED" ]; then
                echo "GATE-3 PASS: CR=APPROVED(status+comment)"
              else
                echo "GATE-3 FAIL: CR=$LATEST_CR status=$CR_STATUS comment=$CR_APPROVE_COMMENT"
                ELIGIBLE=false
              fi
            fi
          fi

          # Gate 4: Bugbot clean — CI check-run conclusion scoped to HEAD SHA.
          BUGBOT_CONCLUSION=$(gh api repos/${{ github.repository }}/commits/"$HEAD_SHA"/check-runs \
            --paginate 2>/dev/null \
            | jq -rs '[.[] | .check_runs[]?] | map(select(.name | test("Cursor Bugbot"; "i"))) | sort_by(.completed_at) | last | .conclusion // "none"' \
            2>/dev/null || echo "error")
          if [ "$BUGBOT_CONCLUSION" = "success" ] || [ "$BUGBOT_CONCLUSION" = "neutral" ] || [ "$BUGBOT_CONCLUSION" = "skipped" ] || [ "$BUGBOT_CONCLUSION" = "none" ]; then
            echo "GATE-4 PASS: Bugbot=$BUGBOT_CONCLUSION (clean)"
          else
            echo "GATE-4 FAIL: Bugbot=$BUGBOT_CONCLUSION"
            ELIGIBLE=false
          fi

          # Gate 5: Inline comments resolved (GraphQL — REST lacks isResolved).
          # Paginates; fail-closed on errors.
          _AUTHOR_STDERR=$(mktemp)
          PR_AUTHOR=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.user.login // empty' 2>"$_AUTHOR_STDERR")
          _GH_EXIT=$?
          true
          rm -f "$_AUTHOR_STDERR"
          if [ -z "$PR_AUTHOR" ] || [ "$_GH_EXIT" -ne 0 ]; then
            echo "GATE-5 FAIL: PR author lookup failed (exit=$_GH_EXIT)"
            ELIGIBLE=false
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
            UNRESOLVED=0; GQL_ERROR=0; CURSOR=""; MAX_PAGES=50; PAGE_COUNT=0
            while true; do
              PAGE_COUNT=$((PAGE_COUNT + 1))
              if [ "$PAGE_COUNT" -gt "$MAX_PAGES" ]; then GQL_ERROR=1; break; fi
              if [ -z "$CURSOR" ]; then
                GQL_RESULT=$(gh api graphql -f query='
                  query($owner: String!, $name: String!, $number: Int!) {
                    repository(owner: $owner, name: $name) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 100) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            isResolved
                            comments(first: 50) {
                              pageInfo { hasNextPage }
                              nodes { author { login } body }
                            }
                          }
                        }
                      }
                    }
                  }
                ' -f owner='${{ github.repository_owner }}' -f name="$REPO_NAME" -F number="$PR_NUM" 2>/dev/null)
              else
                GQL_RESULT=$(gh api graphql -f query='
                  query($owner: String!, $name: String!, $number: Int!, $cursor: String!) {
                    repository(owner: $owner, name: $name) {
                      pullRequest(number: $number) {
                        reviewThreads(first: 100, after: $cursor) {
                          pageInfo { hasNextPage endCursor }
                          nodes {
                            isResolved
                            comments(first: 50) {
                              pageInfo { hasNextPage }
                              nodes { author { login } body }
                            }
                          }
                        }
                      }
                    }
                  }
                ' -f owner='${{ github.repository_owner }}' -f name="$REPO_NAME" -F number="$PR_NUM" -f cursor="$CURSOR" 2>/dev/null)
              fi
              if [ -z "$GQL_RESULT" ] || ! echo "$GQL_RESULT" | jq -e '
                (.errors | not) and
                (.data.repository.pullRequest.reviewThreads.pageInfo != null)
              ' >/dev/null; then
                GQL_ERROR=1; break
              fi
              if [ "$(echo "$GQL_RESULT" | jq -r '[.data.repository.pullRequest.reviewThreads.nodes[].comments.pageInfo.hasNextPage | select(. == true)] | length')" -gt 0 ]; then
                GQL_ERROR=1; break
              fi
              PAGE_UNRESOLVED=$(echo "$GQL_RESULT" | jq -r \
                --arg author "$PR_AUTHOR" \
                '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false) | .comments.nodes[] | select(.author.login != null and (.author.login | ascii_downcase) != ($author | ascii_downcase) and (.body | test("^\\s*(nit:|nitpick)"; "i") | not))] | length')
              UNRESOLVED=$((UNRESOLVED + PAGE_UNRESOLVED))
              HAS_NEXT=$(echo "$GQL_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
              if [ "$HAS_NEXT" != "true" ]; then break; fi
              NEXT_CURSOR=$(echo "$GQL_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')
              if [ -z "$NEXT_CURSOR" ] || [ "$NEXT_CURSOR" = "null" ] || [ "$NEXT_CURSOR" = "$CURSOR" ]; then
                GQL_ERROR=1; break
              fi
              CURSOR="$NEXT_CURSOR"
            done
            if [ "$GQL_ERROR" -eq 1 ]; then
              echo "GATE-5 FAIL: GraphQL error or pagination truncated"
              ELIGIBLE=false
            elif [ "${UNRESOLVED:-0}" -gt 0 ]; then
              echo "GATE-5 FAIL: $UNRESOLVED unresolved comments"
              ELIGIBLE=false
            else
              echo "GATE-5 PASS: all comments resolved"
            fi
          fi

          echo "6-green eligibility: $ELIGIBLE"
          echo "eligible=$ELIGIBLE" >> "$GITHUB_OUTPUT"

          if [ "$ELIGIBLE" != "true" ]; then
            echo "SKIP: PR #$PR_NUM does not meet 6-green eligibility — exiting (not a failure)"
            exit 0
          fi

      # ----------------------------------------------------------------
      # Step 1: Post trigger comment.
      # Lifecycle-manager picks this up and dispatches AO worker to run
      # ao skeptic verify (Codex OAuth, no GHA API keys needed).
      # ----------------------------------------------------------------
      - name: Post skeptic trigger comment
        id: post_trigger
        if: steps.check_6green.outputs.eligible == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.resolve_pr.outputs.pr_num }}
          HEAD_SHA: ${{ steps.check_6green.outputs.head_sha }}
        run: |
          PR_NUM=$PR_NUM
          TRIGGER_SHA="$HEAD_SHA"
          REQUEST_ID="gate-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${PR_NUM}-${TRIGGER_SHA:0:12}"
          BODY=$(printf '%s\n%s\n%s\n%s' \
            "SKEPTIC_GATE_TRIGGER" \
            "<!-- skeptic-request-id-${REQUEST_ID} -->" \
            "<!-- skeptic-head-sha-${TRIGGER_SHA} -->" \
            "<!-- skeptic-gate-trigger-${TRIGGER_SHA} -->")

          # POST with retry for installation REST rate limits (HTTP 403).
          TRIGGER_UPDATED=""
          for _attempt in 1 2 3 4 5; do
            set +e
            TRIGGER_UPDATED=$(gh api -X POST \
              "repos/${GITHUB_REPOSITORY}/issues/${PR_NUM}/comments" \
              -H "Accept: application/vnd.github+json" \
              -f "body=${BODY}" \
              --jq '.updated_at' 2>/dev/null)
            _rc=$?
            set -e
            if [ "$_rc" -eq 0 ] && [ -n "$TRIGGER_UPDATED" ] && [ "$TRIGGER_UPDATED" != "null" ]; then
              break
            fi
            echo "::warning::POST trigger comment failed (rc=${_rc}), attempt ${_attempt}/5 — sleeping 60s"
            sleep 60
          done
          if [ -z "$TRIGGER_UPDATED" ] || [ "$TRIGGER_UPDATED" = "null" ]; then
            echo "ERROR: failed to post trigger comment after retries" >&2
            exit 1
          fi
          echo "Trigger timestamp (GitHub server): $TRIGGER_UPDATED"
          echo "trigger_updated=$TRIGGER_UPDATED" >> "$GITHUB_OUTPUT"
          echo "trigger_sha=$TRIGGER_SHA" >> "$GITHUB_OUTPUT"
          echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"

      # ----------------------------------------------------------------
      # Step 2: Poll for VERDICT comment posted by the AO worker.
      # ----------------------------------------------------------------
      - name: Poll for skeptic VERDICT
        if: steps.check_6green.outputs.eligible == 'true'
        timeout-minutes: ${{ inputs.poll_timeout_minutes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.resolve_pr.outputs.pr_num }}
          HEAD_SHA: ${{ steps.check_6green.outputs.head_sha }}
          TRIGGER_UPDATED: ${{ steps.post_trigger.outputs.trigger_updated }}
          TRIGGER_SHA: ${{ steps.post_trigger.outputs.trigger_sha }}
          REQUEST_ID: ${{ steps.post_trigger.outputs.request_id }}
          SKEPTIC_BOT_AUTHOR: ${{ vars.SKEPTIC_BOT_AUTHOR || 'jleechan2015' }}
        run: |
          PR_NUM=$PR_NUM
          set +e

          if [ -z "$TRIGGER_UPDATED" ] || [ "$TRIGGER_UPDATED" = "null" ]; then
            echo "ERROR: trigger_updated not set — cannot poll for verdicts"
            echo "verdict=ERROR" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ -z "$REQUEST_ID" ] || [ "$REQUEST_ID" = "null" ]; then
            echo "ERROR: request_id not set — cannot safely bind skeptic verdicts"
            echo "verdict=ERROR" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "Only accepting verdicts posted after trigger was updated: $TRIGGER_UPDATED"
          echo "Also filtering by trigger SHA: ${TRIGGER_SHA:0:7}"

          INTERVAL=30
          MAX_ATTEMPTS=$(( ${{ inputs.poll_timeout_minutes }} * 60 / INTERVAL ))   # respect poll_timeout_minutes input

          echo "Polling for VERDICT on PR #$PR_NUM (commit ${HEAD_SHA:0:7})..."
          echo "Max wait: $((MAX_ATTEMPTS * INTERVAL / 60)) minutes"
          echo "REQUEST_ID: $REQUEST_ID"

          API_FAILURES=0
          COMMENTS_API_FAILURES=0
          for i in $(seq 1 $MAX_ATTEMPTS); do
            PR_STATE=$(gh api repos/${{ github.repository }}/pulls/"$PR_NUM" --jq '.state' 2>&1)
            PR_STATE_FAIL=0
            if echo "$PR_STATE" | grep -qi "error\|rate limit\|authentication\|not found\|server error"; then
              API_FAILURES=$((API_FAILURES + 1))
              PR_STATE_FAIL=1
              echo "API warning: PR state lookup failed (attempt $((i))): ${PR_STATE:0:100}"
              if [ "$API_FAILURES" -ge 3 ]; then
                echo "ERROR: Too many consecutive API failures — exiting as ERROR"
                echo "verdict=ERROR" >> "$GITHUB_OUTPUT"
                exit 1
              fi
              echo "Attempt $i/$MAX_ATTEMPTS — sleeping ${INTERVAL}s..."
              sleep $INTERVAL
              continue
            fi

            if [ "$PR_STATE" = "closed" ]; then
              echo "PR closed — exiting"
              echo "verdict=SKIPPED" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            VERDICT_TMP=$(mktemp)
            _VERDICT_STDERR=$(mktemp)
            SKEPTIC_BOT_AUTHOR="$SKEPTIC_BOT_AUTHOR" \
            TRIGGER_SHA="$TRIGGER_SHA" \
            TRIGGER_UPDATED="$TRIGGER_UPDATED" \
            REQUEST_ID="$REQUEST_ID" \
            gh api repos/${{ github.repository }}/issues/"$PR_NUM"/comments \
              --paginate > "$VERDICT_TMP" 2>"$_VERDICT_STDERR"
            _GH_EXIT=$?
            true
            rm -f "$_VERDICT_STDERR"
            VERDICT_RAW=$(cat "$VERDICT_TMP")
            rm -f "$VERDICT_TMP"
            if [ -z "$VERDICT_RAW" ] || [ "$_GH_EXIT" -ne 0 ]; then
              VERDICT_JSON=""
              COMMENTS_API_FAILURES=$((COMMENTS_API_FAILURES + 1))
              API_FAILURES=$((API_FAILURES + 1))
              echo "API warning: verdict lookup failed (exit=$_GH_EXIT, attempt $((i)))"
              if [ "$API_FAILURES" -ge 3 ]; then
                echo "ERROR: Too many consecutive API failures — exiting as ERROR"
                echo "verdict=ERROR" >> "$GITHUB_OUTPUT"
                exit 1
              fi
              echo "Attempt $i/$MAX_ATTEMPTS — sleeping ${INTERVAL}s..."
              sleep $INTERVAL
              continue
            else
              COMMENTS_API_FAILURES=0
              # Only reset main counter when both APIs succeed in the same iteration
              if [ "$PR_STATE_FAIL" -eq 0 ]; then
                API_FAILURES=0
              fi
              VERDICT_JSON=$(echo "$VERDICT_RAW" | jq -s --arg author "$SKEPTIC_BOT_AUTHOR" \
                --arg tu "$TRIGGER_UPDATED" --arg ts "$TRIGGER_SHA" --arg ts_prefix "${TRIGGER_SHA:0:12}" \
                --arg request_id "$REQUEST_ID" \
                --arg pr_author "$PR_AUTHOR" \
                'add
                | map(. + {verdict: (try (.body | capture("^[ \\t]*(?:> ?)?(?:#{1,6}[ \\t]*)?(?:\\*{1,2})?VERDICT:[ \\t]*(?<verdict>PASS|FAIL|SKIPPED)\\b(?:\\*{1,2})?[ \\t]*(?:[-—:][^\\n]*)?" ; "im").verdict | ascii_upcase) catch "")})
                | map(select(
                    (.body as $body
                    | (
                      ((.user.login | ascii_downcase) == ($author | ascii_downcase))
                      or ((.user.login | ascii_downcase) == "jleechan-af")
                      or ((.user.login | ascii_downcase) == "jleechanao")
                      or (
                        ((.user.login | ascii_downcase) == "github-actions[bot]")
                        and ((.user.login | ascii_downcase) != ($pr_author | ascii_downcase))
                      )
                    )
                    and ($body | test("<!--\\s*skeptic-agent-verdict\\s*-->"; "i"))
                    and (.verdict != "")
                    and (((.updated_at // "") | if test("\\.[0-9]+Z$") then sub("\\.[0-9]+Z$"; "Z") else . end)
                         >= ($tu | if test("\\.[0-9]+Z$") then sub("\\.[0-9]+Z$"; "Z") else . end))
                    and ($body | test("skeptic-gate-trigger-" + $ts; "i"))
                    # request-id filter is tolerant for non-empty request IDs:
                    # accept exact match OR any request-id containing the trigger
                    # SHA (full or 12-char prefix). Missing request IDs fail closed
                    # before polling.
                    and (($body | test("<!--\\s*skeptic-request-id-" + $request_id + "\\s*-->"; "i"))
                         or ($body | test("<!--\\s*skeptic-request-id-[^>]*(" + ($ts | tostring) + "|" + $ts_prefix + ")[^>]*-->"; "i")))
                    and ($body | test("<!--\\s*skeptic-head-sha-" + $ts + "\\s*-->"; "i"))
                    and ((.verdict != "PASS")
                         or ((all(range(1;9); . as $gate | ($body | test("<!--\\s*skeptic-gate-" + ($gate | tostring) + "\\s*:\\s*PASS\\s*-->"; "i"))))
                             and ($body | test("<!--\\s*skeptic-gate-8a\\s*:\\s*PASS\\s*-->"; "i"))
                             and ($body | test("<!--\\s*skeptic-gate-8b\\s*:\\s*PASS\\s*-->"; "i"))
                             and ($body | test("<!--\\s*skeptic-gate-8c\\s*:\\s*PASS\\s*-->"; "i"))
                             and ($body | test("<!--\\s*skeptic-gate-8d\\s*:\\s*PASS\\s*-->"; "i")))))
                  ))
                | last // empty' 2>/dev/null || echo "empty")
            fi

            if ! echo "$VERDICT_JSON" | jq -e 'if . == null or (.body == null) then empty else .body end | length > 0' >/dev/null 2>&1; then
              echo "Attempt $i/$MAX_ATTEMPTS — no fresh VERDICT yet, sleeping ${INTERVAL}s..."
              sleep $INTERVAL
              continue
            fi

            VERDICT_BODY=$(echo "$VERDICT_JSON" | jq -r '.body')
            VERDICT_TYPE=$(echo "$VERDICT_JSON" | jq -r '.verdict // ""')
            VERDICT_CREATED=$(echo "$VERDICT_JSON" | jq -r '.updated_at')
            echo ""
            echo "=== Found VERDICT (posted $VERDICT_CREATED) ==="
            echo "$VERDICT_BODY"

            if [ "$VERDICT_TYPE" = "PASS" ]; then
              echo "verdict=PASS" >> "$GITHUB_OUTPUT"
              echo "=== SKEPTIC GATE: PASS ==="
              exit 0
            elif [ "$VERDICT_TYPE" = "FAIL" ]; then
              echo "verdict=FAIL" >> "$GITHUB_OUTPUT"
              echo "=== SKEPTIC GATE: FAIL ==="
              exit 1
            elif [ "$VERDICT_TYPE" = "SKIPPED" ]; then
              echo "verdict=SKIPPED" >> "$GITHUB_OUTPUT"
              echo "=== SKEPTIC GATE: SKIPPED (fail-closed) ==="
              exit 1
            else
              echo "WARNING: VERDICT body is malformed — sleeping ${INTERVAL}s before retry"
              echo "verdict=UNKNOWN" >> "$GITHUB_OUTPUT"
              sleep $INTERVAL
              continue
            fi
          done

          echo "TIMEOUT: No fresh VERDICT after $((MAX_ATTEMPTS * INTERVAL / 60)) minutes"
          echo "verdict=TIMEOUT" >> "$GITHUB_OUTPUT"
          echo "::error::Skeptic Gate timed out waiting for VERDICT — failing closed"
          exit 1
